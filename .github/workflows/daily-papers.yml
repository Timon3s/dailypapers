name: Daily Papers RSS

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FEED_PUBLIC_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/feed.xml
        run: python generate_feed.py

      - name: Commit and push feed.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          git diff --staged --quiet || git commit -m "chore: update feed.xml [skip ci]"
          git pull --rebase
          git push
